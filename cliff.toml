# git-cliff configuration for cursor-live-translator
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog / 更新日志

## Download / 下载指引

| Platform / 平台 | Arch / 架构 | Download / 下载 |
|:---|:---|:---|
| macOS | x64 (Intel) | [Live Translator Hub-{{ version | trim_start_matches(pat="v") }}-mac-x64.dmg](https://github.com/Uncle-Gao/Live-Translator-Hub/releases/download/v{{ version | trim_start_matches(pat="v") }}/Live%20Translator%20Hub-{{ version | trim_start_matches(pat="v") }}-mac-x64.dmg) |
| macOS | arm64 (Apple Silicon) | [Live Translator Hub-{{ version | trim_start_matches(pat="v") }}-mac-arm64.dmg](https://github.com/Uncle-Gao/Live-Translator-Hub/releases/download/v{{ version | trim_start_matches(pat="v") }}/Live%20Translator%20Hub-{{ version | trim_start_matches(pat="v") }}-mac-arm64.dmg) |
| Windows | x64 | [Live Translator Hub-{{ version | trim_start_matches(pat="v") }}-win-x64.exe](https://github.com/Uncle-Gao/Live-Translator-Hub/releases/download/v{{ version | trim_start_matches(pat="v") }}/Live%20Translator%20Hub-{{ version | trim_start_matches(pat="v") }}-win-x64.exe) |
| Linux | x64 | [Live Translator Hub-{{ version | trim_start_matches(pat="v") }}-linux-x64.AppImage](https://github.com/Uncle-Gao/Live-Translator-Hub/releases/download/v{{ version | trim_start_matches(pat="v") }}/Live%20Translator%20Hub-{{ version | trim_start_matches(pat="v") }}-linux-x64.AppImage) |

> **macOS**: If prompted that the developer cannot be verified, go to **System Settings → Privacy & Security** and click "Open Anyway".
> **Windows**: If SmartScreen blocks the app, click "More info" → "Run anyway".
> **Linux**: Run `chmod +x` on the AppImage before executing.

---
"""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}

### Changelog

{% for group, commits in commits | group_by(attribute="group") %}
#### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}
{% endfor %}

{% endfor %}
### 更新日志

{% for group, commits in commits | group_by(attribute="group") %}
#### {% if group == "Features" %}新功能{% elif group == "Bug Fixes" %}Bug 修复{% elif group == "Refactoring" %}重构{% elif group == "Documentation" %}文档{% elif group == "Miscellaneous" %}杂项{% elif group == "Releases" %}发布{% else %}{{ group }}{% endif %}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}
{% endfor %}

{% endfor %}
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^release", group = "Releases" },
  { message = "^🚀", group = "Releases" },
]
protect_breaking_commit_msg = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = []
limit_commits = 100
