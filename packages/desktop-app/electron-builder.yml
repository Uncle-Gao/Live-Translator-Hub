appId: com.live-translator.hub
productName: "Live Translator Hub"
copyright: "Copyright 2026"

directories:
  output: release

publish:
  provider: github
  owner: Uncle-Gao
  repo: Live-Translator-Hub
  releaseType: release

files:
  - dist/**/*
  - dist-electron/**/*
  - build/icon-mac.png
  - node_modules/@live-translator/**/*
  - node_modules/sudo-prompt/**/*
  - node_modules/original-fs/**/*
  - node_modules/electron-updater/**/*

mac:
  category: public.app-category.developer-tools
  icon: build/icon-mac.icns
  target:
    - dmg
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  generateBlockMap: false
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

win:
  icon: build/icon-win.ico
  target:
    - nsis
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  icon: build/icon-linux.png
  target:
    - AppImage
    - deb
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  category: Development
