name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  # Create the GitHub release first so all platform builds have a target
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header -o body.md

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          draft: false
          prerelease: false

  # Build all platforms in parallel, publish to the existing release
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch-flags: '--x64 --arm64'
          - os: windows-latest
            platform: win
            arch-flags: '--x64'
          - os: ubuntu-latest
            platform: linux
            arch-flags: '--x64'

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync version from git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          cd packages/desktop-app
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run dist -w desktop-app

      - name: Package with electron-builder
        run: npx electron-builder --config electron-builder.yml ${{ matrix.arch-flags }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/desktop-app
