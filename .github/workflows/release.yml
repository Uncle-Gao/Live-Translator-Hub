name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch-flags: '--x64 --arm64'
          - os: windows-latest
            platform: win
            arch-flags: '--x64'
          - os: ubuntu-latest
            platform: linux
            arch-flags: '--x64'

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync version from git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          cd packages/desktop-app
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run dist -w desktop-app

      - name: Package with electron-builder
        run: npx electron-builder --config packages/desktop-app/electron-builder.yml ${{ matrix.arch-flags }}
        working-directory: packages/desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        if: matrix.platform == 'mac'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header -o body.md

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ matrix.platform == 'mac' && 'body.md' || '' }}
          files: |
            packages/desktop-app/release/*
          fail_on_unmatched_files: false
